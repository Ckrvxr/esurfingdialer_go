name: build

on:
  push:
    tags: [v*]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target:
          - linux/amd64
          - linux/arm64
          - linux/armv6,arm,6
          - linux/armv7,arm,7
          - linux/loong64
          - linux/mips
          - linux/mipsle
          - linux/riscv64
          - windows/amd64
          - windows/arm64
          - darwin/amd64
          - darwin/arm64
          - freebsd/amd64
          - freebsd/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Parse target
        id: parse
        shell: bash
        run: |
          IFS=',' read -r name goarch goarm <<< "${{ matrix.target }}"
          os="${name%/*}"
          arch="${name#*/}"
          echo "namearch=${os}-${arch}" >> $GITHUB_OUTPUT
          echo "os=$os" >> $GITHUB_OUTPUT
          echo "goarch=${goarch:-$arch}" >> $GITHUB_OUTPUT
          echo "goarm=$goarm" >> $GITHUB_OUTPUT

      - name: Build
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          ext=""
          [ "${{ steps.parse.outputs.os }}" = "windows" ] && ext=".exe"
          out="esurfingdialer_${ver}_${{ steps.parse.outputs.namearch }}${ext}"

          export GOOS="${{ steps.parse.outputs.os }}"
          export GOARCH="${{ steps.parse.outputs.goarch }}"
          export GOARM="${{ steps.parse.outputs.goarm }}"
          export GOMIPS=softfloat

          go build \
            -tags="nethttpomithttp2" \
            -ldflags="-s -w" \
            -trimpath \
            -o "$out" .

      - name: Compress
        if: steps.parse.outputs.os == 'linux' || steps.parse.outputs.os == 'windows'
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          ext=""
          [ "${{ steps.parse.outputs.os }}" = "windows" ] && ext=".exe"
          out="esurfingdialer_${ver}_${{ steps.parse.outputs.namearch }}${ext}"

          upx --lzma "$out" -o "${out}.packed" 2>/dev/null && mv "${out}.packed" "$out" || true

      - uses: actions/upload-artifact@v4
        with:
          name: esurfingdialer_${{ steps.parse.outputs.namearch }}
          path: esurfingdialer_*

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: esurfingdialer_*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: esurfingdialer_*
          generate_release_notes: true
          fail_on_unmatched_files: false
